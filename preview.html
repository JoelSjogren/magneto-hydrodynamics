<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>magneto-hydrodynamics — README</title>
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-dark.min.css">
<style>
  /* Same dark palette as gallery.html / dashboard.html, applied
     unconditionally (not gated on prefers-color-scheme). */
  body { margin: 0; background: #14161a; color: #d8dce2; }
  nav { background: #1c1f26; padding: 10px 18px; font-family: sans-serif;
        font-size: 14px; position: sticky; top: 0; z-index: 1; }
  nav a { color: #7ab7ff; text-decoration: none; }
  nav a:hover { text-decoration: underline; }
  .markdown-body {
    box-sizing: border-box;
    max-width: 980px;
    margin: 0 auto;
    padding: 45px;
    background: transparent;
  }
  @media (max-width: 767px) { .markdown-body { padding: 15px; } }
  #status { font-family: sans-serif; color: #9aa3b0; padding: 2em; }
  mjx-container[display="true"] { overflow-x: auto; overflow-y: hidden; }
</style>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    startup: { typeset: false }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" defer></script>
</head>
<body>
<nav>
  <a href="preview.html">README</a> ·
  <a href="preview.html?file=LOGBOOK.md">logbook</a> ·
  <a href="preview.html?file=reconn.md">reconnection catalogue</a> ·
  <a href="preview.html?file=neutrinos.md">neutrinos & coherence</a> ·
  <a href="preview.html?file=nattoh.md">Nattoh gallery</a> ·
  <a href="gallery.html">video gallery</a> ·
  <a href="out/videos/">raw videos</a> ·
  <a href="dashboard.html">dashboard</a>
</nav>
<article class="markdown-body"><p id="status">Loading ...</p></article>
<script>
(async () => {
  const article = document.querySelector('.markdown-body');
  const file = new URLSearchParams(location.search).get('file') || 'README.md';
  document.title = 'magneto-hydrodynamics — ' + file;
  try {
    const res = await fetch(file, { cache: 'no-store' });
    if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
    let md = await res.text();

    // Shield math from the markdown parser (underscores etc. would be
    // eaten as emphasis), restore it afterwards for MathJax.
    const stash = [];
    const shield = re => {
      md = md.replace(re, m => {
        stash.push(m);
        return '@@MATH' + (stash.length - 1) + '@@';
      });
    };
    shield(/\$\$[\s\S]+?\$\$/g);          // display math
    shield(/\$[^$\n]+?\$/g);              // inline math

    marked.setOptions({ gfm: true, breaks: false });
    let html = marked.parse(md);
    html = html.replace(/@@MATH(\d+)@@/g, (_, i) =>
      stash[+i].replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'));
    article.innerHTML = html;

    const typeset = () => MathJax.typesetPromise([article]);
    if (window.MathJax && MathJax.typesetPromise) typeset();
    else window.addEventListener('load', typeset);
  } catch (err) {
    article.innerHTML = '<p id="status">Failed to load ' + file + ': ' + err.message + '</p>';
  }
})();
</script>
</body>
</html>
